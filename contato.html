<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basquete - Contato</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Cabeçalho -->
    <header>
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23ff6600' stroke='%23000' stroke-width='2'/%3E%3Cpath d='M 50 2 Q 50 50 50 98' stroke='%23000' stroke-width='1.5' fill='none'/%3E%3Cpath d='M 2 50 Q 50 50 98 50' stroke='%23000' stroke-width='1.5' fill='none'/%3E%3Cpath d='M 15 15 Q 50 50 85 85' stroke='%23000' stroke-width='1.5' fill='none'/%3E%3Cpath d='M 85 15 Q 50 50 15 85' stroke='%23000' stroke-width='1.5' fill='none'/%3E%3C/svg%3E" alt="Logo Basquete" class="logo">
        <h1>Mundo do Basquete</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="historia.html">História</a>
            <a href="regras.html">Regras</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        <h2>Entre em Contato</h2>

        <p>Quer saber mais sobre basquete? Preencha o formulário abaixo!</p>

        <form>
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="5" max="100">

            <label for="time">Qual seu time favorito?</label>
            <select id="time" name="time">
                <option value="">Selecione...</option>
                <option value="lakers">Los Angeles Lakers</option>
                <option value="bulls">Chicago Bulls</option>
                <option value="warriors">Golden State Warriors</option>
                <option value="celtics">Boston Celtics</option>
                <option value="outro">Outro</option>
            </select>

            <label>Você joga basquete?</label>
            <div class="radio-group">
                <input type="radio" id="joga-sim" name="joga" value="sim">
                <label for="joga-sim">Sim</label>
                
                <input type="radio" id="joga-nao" name="joga" value="nao">
                <label for="joga-nao">Não</label>
            </div>

            <label>O que você gosta no basquete? (pode marcar várias)</label>
            <div class="checkbox-group">
                <input type="checkbox" id="jogo" name="interesse" value="jogo">
                <label for="jogo">Jogar</label>
                
                <input type="checkbox" id="assistir" name="interesse" value="assistir">
                <label for="assistir">Assistir jogos</label>
                
                <input type="checkbox" id="nba" name="interesse" value="nba">
                <label for="nba">NBA</label>
            </div>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5"></textarea>

            <button type="submit">Enviar</button>
        </form>

    </main>

    <!-- Rodapé -->
    <footer>
    <p><strong>Email:</strong> iarleyjesus7@gmail.com</p>
    </footer>
</body>
</html>
